name: CI

# Cross-SDK parity and asset-drift gate. Every push to main and every PR runs
# the asset-sync check plus the three SDK suites and the site build, so a schema
# or template change cannot land without all three reference SDKs staying in
# sync and green. Actions are pinned to major tags for readability; pin to full
# commit SHAs before the public launch for supply-chain hardening.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  assets:
    name: Asset sync (no drift across SDKs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run assets:check

  lint:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint

  node-sdk:
    name: Node SDK (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build -w packages/sdk
      - run: npm test -w packages/sdk

  python-sdk:
    name: Python SDK (lint + type + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: packages/sdk-py
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: Ruff
        working-directory: packages/sdk-py
        run: ruff check . && ruff format --check .
      - name: Mypy
        working-directory: packages/sdk-py
        run: mypy src
      - name: Pytest
        working-directory: packages/sdk-py
        run: pytest -q

  go-sdk:
    name: Go SDK (fmt + vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: gofmt
        working-directory: packages/sdk-go
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: go vet
        working-directory: packages/sdk-go
        run: go vet ./...
      - name: go test
        working-directory: packages/sdk-go
        run: go test ./...
      # Validate the release config so a broken .goreleaser.yaml is caught on PR,
      # not at the irreversible release tag.
      - name: goreleaser check
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          workdir: packages/sdk-go
          args: check

  site:
    name: Site (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build -w leji-site
