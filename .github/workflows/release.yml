name: Release

# Tag-driven, OIDC-published multi-registry release. Per-package path-prefixed
# tags; each triggers only its own publish job:
#
#   packages/sdk/v*          -> npm `@leji-org/leji` + JSR `@leji-org/leji`
#   packages/create-leji/v*  -> npm `create-leji`
#   packages/sdk-py/v*       -> PyPI `leji`
#   packages/sdk-go/v*       -> Go module index + goreleaser binaries (DRAFT)
#   packages/mcp/v*          -> npm `@leji-org/mcp`  (tag after packages/sdk/v* is live)
#
# Trusted publishers must be configured on each registry before tagging.
# Actions pinned to full commit SHAs for supply-chain hardening.

on:
  push:
    tags:
      - "packages/sdk/v*"
      - "packages/create-leji/v*"
      - "packages/sdk-py/v*"
      - "packages/sdk-go/v*"
      - "packages/mcp/v*"

permissions:
  contents: read

jobs:
  # Pre-publish gate on EVERY release tag: builds the publishable artifacts,
  # cold-installs each, and asserts the CLI battery + cross-SDK parity.
  smoke:
    name: Pre-publish smoke (all SDKs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.23"
      - run: npm ci
      - name: Build artifacts, cold-install each, assert CLI battery + cross-SDK parity
        run: npm run smoke:prepublish

  # --- packages/sdk/v* : npm `@leji-org/leji` + JSR `@leji-org/leji` (same tag, two jobs) ---

  npm:
    name: Publish leji to npm
    if: startsWith(github.ref, 'refs/tags/packages/sdk/v')
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing (provenance automatic, no token)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      # OIDC trusted publishing needs npm >= 11.5.1 (Node 24 may ship older).
      - run: npm install -g npm@latest && npm --version
      - run: npm ci
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#packages/sdk/v}"
          PKG="$(node -p "require('./packages/sdk/package.json').version")"
          test "$TAG" = "$PKG" || { echo "tag packages/sdk/v$TAG != packages/sdk version $PKG"; exit 1; }
      - run: npm run assets:check
      - run: npm run build -w packages/sdk
      - run: npm test -w packages/sdk
      # OIDC trusted publishing: no stored token, provenance automatic.
      - name: Publish (OIDC trusted publishing)
        working-directory: packages/sdk
        run: npm publish --access public

  jsr:
    name: Publish @leji-org/leji to JSR (OIDC)
    if: startsWith(github.ref, 'refs/tags/packages/sdk/v')
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # JSR OIDC publishing
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
      - run: npm ci
      - name: Verify tag matches jsr.json version
        run: |
          TAG="${GITHUB_REF_NAME#packages/sdk/v}"
          PKG="$(node -p "require('./packages/sdk/jsr.json').version")"
          test "$TAG" = "$PKG" || { echo "tag packages/sdk/v$TAG != jsr.json version $PKG"; exit 1; }
      # JSR publishes the TS source (per jsr.json), not the npm dist tarball.
      - name: Publish to JSR
        working-directory: packages/sdk
        run: npx jsr publish

  # --- packages/create-leji/v* : npm `create-leji` (first-class, own tag) ---

  create-leji:
    name: Publish create-leji to npm
    if: startsWith(github.ref, 'refs/tags/packages/create-leji/v')
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing (provenance automatic, no token)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest && npm --version
      - run: npm ci
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#packages/create-leji/v}"
          PKG="$(node -p "require('./packages/create-leji/package.json').version")"
          test "$TAG" = "$PKG" || { echo "tag packages/create-leji/v$TAG != create-leji version $PKG"; exit 1; }
      # Tag AFTER packages/sdk/v* is live so the @leji-org/leji dep resolves.
      - name: Publish (OIDC trusted publishing)
        working-directory: packages/create-leji
        run: npm publish --access public

  # --- packages/mcp/v* : npm `@leji-org/mcp` ---

  npm-mcp:
    name: Publish @leji-org/mcp to npm
    if: startsWith(github.ref, 'refs/tags/packages/mcp/v')
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing (provenance automatic, no token)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest && npm --version
      - run: npm ci
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#packages/mcp/v}"
          PKG="$(node -p "require('./packages/mcp/package.json').version")"
          test "$TAG" = "$PKG" || { echo "tag packages/mcp/v$TAG != packages/mcp version $PKG"; exit 1; }
      - run: npm run assets:check
      - run: npm run build -w packages/sdk
      - run: npm run build -w packages/mcp
      - run: npm test -w packages/mcp
      # Tag AFTER packages/sdk/v* is live (MCP depends on @leji-org/leji).
      - name: Publish (OIDC trusted publishing)
        working-directory: packages/mcp
        run: npm publish --access public

  # --- packages/sdk-py/v* : PyPI `leji` ---

  pypi:
    name: Publish leji to PyPI (trusted publishing)
    if: startsWith(github.ref, 'refs/tags/packages/sdk-py/v')
    needs: smoke
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#packages/sdk-py/v}"
          PKG="$(grep -m1 '^version' packages/sdk-py/pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          test "$TAG" = "$PKG" || { echo "tag packages/sdk-py/v$TAG != pyproject version $PKG"; exit 1; }
      - name: Test
        working-directory: packages/sdk-py
        run: python -m pip install --upgrade pip && pip install -e ".[dev]" && pytest -q
      - name: Build sdist + wheel
        working-directory: packages/sdk-py
        run: python -m pip install --upgrade build && python -m build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: packages/sdk-py/dist

  # --- packages/sdk-go/v* : Go module index + goreleaser binaries (DRAFT) ---

  go:
    name: Release Go binaries (goreleaser, draft)
    if: startsWith(github.ref, 'refs/tags/packages/sdk-go/v')
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/update the DRAFT GitHub Release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history so goreleaser sees tags
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.23"
      - name: Verify tag matches SDK version
        run: |
          TAG="${GITHUB_REF_NAME#packages/sdk-go/v}"
          PKG="$(sed -nE 's/^var SDKVersion = "([^"]+)".*/\1/p' packages/sdk-go/internal/schemas/schemas.go)"
          test "$TAG" = "$PKG" || { echo "tag packages/sdk-go/v$TAG != SDKVersion $PKG"; exit 1; }
      # goreleaser can't parse the path-prefixed tag as a version, so create a
      # LOCAL bare tag for the run (never pushed; no repo-wide vX.Y.Z ref).
      - name: Prepare goreleaser version tag (local only)
        run: |
          VERSION="${GITHUB_REF_NAME#packages/sdk-go/v}"
          git tag "v$VERSION"
          echo "GORELEASER_CURRENT_TAG=v$VERSION" >> "$GITHUB_ENV"
          echo "LEJI_VERSION=$VERSION" >> "$GITHUB_ENV"
      - name: Build cross-platform binaries (goreleaser, no publish)
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: "~> v2"
          workdir: packages/sdk-go
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # DRAFT release on the path-prefixed tag; the finalize step publishes it.
      - name: Draft GitHub Release on the path-prefixed tag with the binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            packages/sdk-go/dist/leji_*.tar.gz \
            packages/sdk-go/dist/leji_*.zip \
            packages/sdk-go/dist/checksums.txt \
            --draft --title "Leji v$LEJI_VERSION" \
            --notes "Leji v$LEJI_VERSION. Cross-platform leji binaries; see https://leji.org."
