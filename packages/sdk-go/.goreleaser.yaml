# goreleaser config for the Leji Go SDK (single-binary distribution).
# Released from a path-prefixed tag; the workflow passes the bare
# version in GORELEASER_CURRENT_TAG, so `{{ .Version }}` resolves to e.g. 1.0.0.
# Builds cross-platform binaries into a DRAFT release the finalize step publishes.
version: 2

project_name: leji

builds:
  - id: leji
    main: ./cmd/leji
    binary: leji
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    # Stamp SDKVersion so the binary's `leji --version` matches the released tag.
    ldflags:
      - -s -w
      - -X github.com/leji-org/leji/packages/sdk-go/internal/schemas.SDKVersion={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: leji
    formats: [tar.gz]
    name_template: "leji_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

# Release notes are authored by hand; goreleaser generates no changelog.
changelog:
  disable: true

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

release:
  # DRAFT release; the finalize step publishes it after all registries succeed.
  draft: true
  # Path-prefixed git tag, but the human-facing release is titled "Leji v1.0.0".
  name_template: "Leji v{{ .Version }}"
  # The repo (leji-org/leji) is inferred from the git remote / GITHUB_REPOSITORY.
